</head>
<body>

<header id="avaleht">
	<div class="header-inner">
		<h1>Matkagrupp Eesti</h1>
		<p>Risti läbi Eestimaa!</p>
	</div>

	<nav class="site-nav" aria-label="Põhinavigatsioon">
		<button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">🌙 Tume režiim</button>
		<ul>
			<li><a href="index.html">Avaleht</a></li>
			<li><a href="retked.html">Retked</a></li>

		</ul>
	</nav>
</header>

<main>
	<section class="content-section">
		<h2>Blogi postitused</h2>
		<form id="blogPostForm" class="feedback-form">
			<label for="blogTitle">Pealkiri</label>
			<input id="blogTitle" type="text" placeholder="Postituse pealkiri" required>

			<label for="blogAuthorName">Autor</label>
			<input id="blogAuthorName" type="text" placeholder="Autori nimi">

			<label for="blogExcerpt">Lühitutvustus</label>
			<textarea id="blogExcerpt" rows="2" placeholder="Lühike sissejuhatus"></textarea>

			<label for="blogContent">Sisu</label>
			<textarea id="blogContent" placeholder="Kirjuta postituse sisu" rows="6" required></textarea>

			<button type="submit">Lisa postitus</button>
		</form>
		<p id="blogAuthHint" class="status-message info" aria-live="polite"></p>
		<p id="blogStatus" class="status-message" aria-live="polite"></p>
	</section>

	<section class="content-section">
		<h2>Viimased postitused</h2>
		<div id="blogPostsList" class="blog-posts-list" aria-live="polite"></div>
	</section>
</main>

<footer>

</footer>

</body>
</html>
