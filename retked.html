<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retked - Brokrogain Eesti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="avaleht">
    <h1>Brokrogain Eesti</h1>
    <p>Risti läbi Eestimaa!</p>

    <nav>
        <ul>
            <li><a href="index.html">Avaleht</a></li>
            <li><a href="retked.html">Retked</a></li>

            <li><a href="brokrogainilugu.html">Brokrogaini lugu</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="breadcrumb">
        <a href="index.html">← Avaleht</a> / Retked
    </div>

    <section class="content-section">
        <h2>Retked</h2>
        <p>Siin on kõik meie seni kirja pandud matkad.</p>

        <!-- Retke lisamise vorm -->
        <div class="upload-form">
            <input type="date" id="hikeDate" />
            <input type="text" id="hikeDistance" placeholder="Kaugus (km)" />
            <input type="text" id="hikeDifficulty" placeholder="Raskusaste" />
            <input type="text" id="hikeSummary" placeholder="Lühikirjeldus" />
            <input type="text" id="hikeLocation" placeholder="Asukoht (näit. &quot;Valgejärv&quot;)" autocomplete="off" />
        <!-- Google Places API autocomplete will populate this field when enabled -->
            <input type="url" id="hikeLink" placeholder="Matka kogemused (valikuline)" />
            <button onclick="addHike()">Lisa retk</button>
        </div>
        <p id="hikeStatus"></p>

        <div class="card-container" id="hikesContainer">
            <!-- cards will be injected here by script -->
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Brokrogain Eesti. Eesti looduse armastajad.</p>
    <p><a href="mailto:info@brokrogain.ee">Kirjuta meile</a> või <a href="#">jää jälgijaks</a></p>
</footer>

<!-- load Google Maps Places library for location autocomplete (replace YOUR_API_KEY) -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

<script src="script.js"></script>
</body>
</html>
