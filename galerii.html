<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brokrogain - Galerii</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚶 Brokrogain Eesti</h1>
        <nav>
            <ul>
                <li><a href="index.html">Avaleht</a></li>
                <li><a href="retked.html">Retked</a></li>
                <li><a href="galerii.html">Galerii</a></li>
                <li><a href="brokrogainilugu.html">Brokrogaini lugu</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="breadcrumb">
            <a href="index.html">← Avaleht</a> / Galerii
        </div>

        <section class="content-section">
            <h2>Brokrogain Eesti Galerii</h2>
            <p>Vaata fantastilisi hetki meie matkadelt üle Eesti!</p>
        </section>

        <!-- Upload form -->
        <section class="content-section" style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 40px;">
            <h3>📸 Lisa oma pilt galeriisse</h3>
            <div style="display: grid; gap: 15px; max-width: 500px;">
                <input type="text" id="collectionName" placeholder="Kuupäev (nt. '01. märts 2026')" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="file" id="imageInput" accept="image/*" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                <input type="text" id="imageTitle" placeholder="Asukoht (nt. 'Valgejärv')" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                <button onclick="uploadImage()" style="padding: 12px; background: #4F46E5; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;">
                    📤 Laadi üles
                </button>
            </div>
            <p id="uploadStatus" style="margin-top: 15px; font-weight: bold;"></p>
        </section>

        <!-- Gallery -->
        <section class="content-section">
            <h3>📷 Galerii</h3>
            <div id="galleryContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
                <p style="grid-column: 1/-1; text-align: center; color: #999;">Laadin...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Brokrogain Eesti. Kõik õigused kaitstud.</p>
    </footer>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
