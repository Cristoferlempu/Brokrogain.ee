<body>

<header id="avaleht">
  <div class="header-inner">
    <h1>Matkagrupp Eesti</h1>
    <p>Risti läbi Eestimaa!</p>
  </div>

  <nav class="site-nav" aria-label="Põhinavigatsioon">
    <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">🌙 Tume režiim</button>
    <ul>

    </ul>
  </nav>
</header>

<main>
  <section class="content-section">
    <h2>Konto</h2>
    <p id="currentUser">Pole sisse logitud</p>
    <p id="authStatus" class="status-message" aria-live="polite"></p>
  </section>

  <section class="content-section" id="registerSection">
    <h2>Loo konto</h2>
    <form id="registerForm" class="feedback-form">
      <label for="registerUsername">Username</label>
      <input id="registerUsername" type="text" placeholder="Sinu kasutajanimi" required>

      <label for="registerEmail">Email</label>
      <input id="registerEmail" type="email" placeholder="nimi@email.com" required>

      <label for="registerPassword">Parool</label>
      <input id="registerPassword" type="password" placeholder="Vähemalt 6 märki" required>

      <button type="submit">Loo konto</button>
    </form>
  </section>

  <section class="content-section" id="loginSection">
    <h2>Logi sisse</h2>
    <form id="loginForm" class="feedback-form">
      <label for="loginUsername">Username</label>
      <input id="loginUsername" type="text" placeholder="Sinu kasutajanimi" required>

      <label for="loginPassword">Parool</label>
      <input id="loginPassword" type="password" placeholder="Parool" required>

      <button type="submit">Logi sisse</button>
    </form>
  </section>

  <section class="content-section" id="logoutSection">
    <h2>Väljalogimine</h2>
    <button id="logoutButton" class="btn" type="button">Logi välja</button>
  </section>
</main>

<footer>
  <p>&copy; 2026 Matkagrupp Eesti. Eesti looduse armastajad.</p>

</footer>

</body>
</html>
